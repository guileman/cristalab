<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrystaloLab 3D - Mobile Engineering</title>
    <style>
        :root { --accent: #00ffcc; --bg: #050508; --panel: rgba(10, 10, 15, 0.9); }
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg); color: #e0e0e0; font-size: 11px; }
        
        #header { position: absolute; top: 0; width: 100%; text-align: center; padding: 10px 0; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); z-index: 5; }
        h1 { margin: 0; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); font-size: 1.1rem; }

        /* Panel adaptado a móviles (inferior) */
        #ui { 
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; 
            background: var(--panel); padding: 15px; border-top: 2px solid var(--accent); 
            max-height: 45vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            backdrop-filter: blur(10px);
        }

        .group { margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .full-width { grid-column: span 2; }
        
        label { font-size: 0.55rem; color: #888; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 3px; }
        .read-only { color: var(--accent); font-family: monospace; font-size: 0.9rem; padding: 4px 0; }
        
        select, input[type="number"], input[type="range"] { 
            width: 100%; background: #15151a; color: #fff; border: 1px solid #333; 
            padding: 8px; border-radius: 4px; font-size: 0.9rem; outline: none; box-sizing: border-box; 
        }

        .btn-toggle { 
            width: 100%; padding: 10px; border: 1px solid var(--accent); background: transparent; 
            color: var(--accent); cursor: pointer; font-size: 0.7rem; letter-spacing: 1px; 
            transition: 0.3s; text-transform: uppercase; border-radius: 4px;
        }
        .btn-active { background: var(--accent) !important; color: #000 !important; font-weight: bold; }
        
        .stats { font-family: monospace; font-size: 0.65rem; color: #aaa; grid-column: span 2; display: flex; justify-content: space-between; }
        .val { color: var(--accent); }

        @media (min-width: 768px) {
            #ui { width: 320px; top: 60px; bottom: 20px; left: 20px; right: auto; max-height: none; border-top: none; border-left: 3px solid var(--accent); border-radius: 4px; }
            .full-width, .group { grid-column: span 2; }
        }
    </style>
</head>
<body>

<div id="header">
    <h1>CrystaloLab <span style="font-weight: 100; color: #fff;">3D</span></h1>
</div>

<div id="ui">
    <div class="group full-width">
        <label>Selección de Metal</label>
        <select id="preset-metal">
            <option value="fe">Hierro (α-Fe) - BCC</option>
            <option value="al">Aluminio - FCC</option>
            <option value="cu">Cobre - FCC</option>
            <option value="au">Oro - FCC</option>
            <option value="ag">Plata - FCC</option>
            <option value="ni">Níquel - FCC</option>
            <option value="w">Wolframio - BCC</option>
            <option value="mo">Molibdeno - BCC</option>
            <option value="pt">Platino - FCC</option>
            <option value="pb">Plomo - FCC</option>
        </select>
    </div>

    <div class="group">
        <label>Celda a=b=c (Å)</label>
        <div id="read-a" class="read-only">2.86</div>
    </div>
    <div class="group">
        <label>Radio Atómico (Å)</label>
        <div id="read-r" class="read-only">1.24</div>
    </div>

    <div class="group full-width">
        <label>Repetición (Nx, Ny, Nz)</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
            <input type="number" id="nx" value="2" min="1" max="10">
            <input type="number" id="ny" value="2" min="1" max="10">
            <input type="number" id="nz" value="2" min="1" max="10">
        </div>
    </div>

    <div class="group full-width">
        <label>Plano Miller (h k l)</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 8px;">
            <input type="number" id="mh" value="1">
            <input type="number" id="mk" value="1">
            <input type="number" id="ml" value="1">
        </div>
        <button id="toggle-plane" class="btn-toggle btn-active">CORTE: ACTIVADO</button>
        <label style="margin-top:10px;">Desplazamiento del Plano</label>
        <input type="range" id="plane-pos" min="-1" max="10" step="0.1" value="0">
    </div>

    <div class="stats">
        <span>Vol: <span id="stat-vol" class="val">0</span> Å³</span>
        <span>Átomos: <span id="stat-atoms" class="val">0</span></span>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Base de datos de metales ampliada
    const metales = {
        fe: { n: "Hierro", a: 2.866, b: "I", r: 1.24, col: 0x999999 },
        al: { n: "Aluminio", a: 4.049, b: "F", r: 1.43, col: 0xe0e0e0 },
        cu: { n: "Cobre", a: 3.615, b: "F", r: 1.28, col: 0xb87333 },
        au: { n: "Oro", a: 4.078, b: "F", r: 1.44, col: 0xffd700 },
        ag: { n: "Plata", a: 4.085, b: "F", r: 1.44, col: 0xeeeeee },
        ni: { n: "Níquel", a: 3.524, b: "F", r: 1.25, col: 0x9fb1bd },
        w:  { n: "Wolframio", a: 3.165, b: "I", r: 1.37, col: 0x666666 },
        mo: { n: "Molibdeno", a: 3.147, b: "I", r: 1.36, col: 0x888888 },
        pt: { n: "Platino", a: 3.924, b: "F", r: 1.39, col: 0xd5d5d5 },
        pb: { n: "Plomo", a: 4.950, b: "F", r: 1.75, col: 0x555566 }
    };

    let scene, camera, renderer, controls, mainGroup, planeVisual, clipPlane;
    let isPlaneActive = true;
    let currentMetal = metales.fe;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 20);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.localClippingEnabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x050508);
        document.body.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);
        
        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        mainGroup = new THREE.Group();
        scene.add(mainGroup);

        clipPlane = new THREE.Plane(new THREE.Vector3(1, 1, 1).normalize(), 0);

        // Listeners de UI
        document.getElementById('preset-metal').addEventListener('change', updateMetalData);
        document.getElementById('toggle-plane').addEventListener('click', function() {
            isPlaneActive = !isPlaneActive;
            this.classList.toggle('btn-active');
            build();
        });

        const inputs = ['nx','ny','nz','mh','mk','ml','plane-pos'];
        inputs.forEach(id => document.getElementById(id).addEventListener('input', build));

        updateMetalData();
    }

    function updateMetalData() {
        currentMetal = metales[document.getElementById('preset-metal').value];
        document.getElementById('read-a').textContent = currentMetal.a.toFixed(3);
        document.getElementById('read-r').textContent = currentMetal.r.toFixed(2);
        build();
    }

    function build() {
        mainGroup.clear();
        if(planeVisual) scene.remove(planeVisual);

        const a = currentMetal.a;
        const nx = parseInt(document.getElementById('nx').value) || 1;
        const ny = parseInt(document.getElementById('ny').value) || 1;
        const nz = parseInt(document.getElementById('nz').value) || 1;
        const h = parseFloat(document.getElementById('mh').value) || 0;
        const k = parseFloat(document.getElementById('mk').value) || 0;
        const l = parseFloat(document.getElementById('ml').value) || 0;
        const pos = parseFloat(document.getElementById('plane-pos').value) || 0;

        // Matriz identidad para cúbicos simples
        const matrix = new THREE.Matrix4().makeScale(a, a, a);
        document.getElementById('stat-vol').textContent = Math.pow(a, 3).toFixed(2);

        let motif = [[0,0,0]];
        if(currentMetal.b === 'I') motif.push([0.5, 0.5, 0.5]);
        if(currentMetal.b === 'F') motif.push([0.5, 0.5, 0], [0.5, 0, 0.5], [0, 0.5, 0.5]);

        if(isPlaneActive) {
            const normal = new THREE.Vector3(h, k, l).normalize().multiplyScalar(-1);
            if(normal.length() === 0) normal.set(0, -1, 0);
            clipPlane.set(normal, pos * a); 
            
            planeVisual = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100), 
                new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.15, side: THREE.DoubleSide })
            );
            planeVisual.position.copy(normal).multiplyScalar(-pos * a);
            planeVisual.lookAt(new THREE.Vector3().addVectors(planeVisual.position, normal));
            scene.add(planeVisual);
        }

        const sphereGeo = new THREE.SphereGeometry(currentMetal.r, 24, 24);
        const matOuter = new THREE.MeshStandardMaterial({ 
            color: currentMetal.col, metalness: 0.7, roughness: 0.2, transparent: true, opacity: 1,
            clippingPlanes: isPlaneActive ? [clipPlane] : [], side: THREE.FrontSide
        });
        const matInner = new THREE.MeshBasicMaterial({ 
            color: 0x111111, clippingPlanes: isPlaneActive ? [clipPlane] : [], side: THREE.BackSide 
        });

        let count = 0;
        for(let x=0; x<nx; x++) {
            for(let y=0; y<ny; y++) {
                for(let z=0; z<nz; z++) {
                    // Dibujar aristas de celda
                    const points = [
                        new THREE.Vector3(x*a, y*a, z*a), new THREE.Vector3((x+1)*a, y*a, z*a),
                        new THREE.Vector3((x+1)*a, (y+1)*a, z*a), new THREE.Vector3(x*a, (y+1)*a, z*a),
                        new THREE.Vector3(x*a, y*a, (z+1)*a), new THREE.Vector3((x+1)*a, y*a, (z+1)*a),
                        new THREE.Vector3((x+1)*a, (y+1)*a, (z+1)*a), new THREE.Vector3(x*a, (y+1)*a, (z+1)*a)
                    ];
                    const indices = [0,1, 1,2, 2,3, 3,0, 4,5, 5,6, 6,7, 7,4, 0,4, 1,5, 2,6, 3,7];
                    const lineGeom = new THREE.BufferGeometry().setFromPoints(indices.map(i => points[i]));
                    mainGroup.add(new THREE.LineSegments(lineGeom, new THREE.LineBasicMaterial({color: 0x444444, clippingPlanes: isPlaneActive ? [clipPlane] : []})));

                    motif.forEach(m => {
                        const p = new THREE.Vector3((m[0]+x)*a, (m[1]+y)*a, (m[2]+z)*a);
                        const atom = new THREE.Mesh(sphereGeo, matOuter);
                        atom.position.copy(p);
                        const inner = new THREE.Mesh(sphereGeo, matInner);
                        inner.position.copy(p);
                        mainGroup.add(atom, inner);
                        count++;
                    });
                }
            }
        }
        document.getElementById('stat-atoms').textContent = count;
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
